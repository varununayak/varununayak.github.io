<svg xmlns="http://www.w3.org/2000/svg" width="800" height="320" viewBox="0 0 800 320" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif">
  <defs>
    <linearGradient id="loopGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#60a5fa"/>
      <stop offset="100%" stop-color="#60a5fa"/>
    </linearGradient>
    <filter id="shadowLoop">
      <feDropShadow dx="1" dy="1" stdDeviation="2" flood-opacity="0.3"/>
    </filter>
    <marker id="arrowCyan" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#60a5fa"/>
    </marker>
    <marker id="arrowRed" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#f87171"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="800" height="320" fill="#0f1117" rx="10"/>

  <!-- Title -->
  <text x="400" y="30" text-anchor="middle" fill="url(#loopGrad)" font-size="18" font-weight="bold">SimEnvironment.run() - 100Hz Update Loop</text>

  <!-- Start -->
  <ellipse cx="60" cy="110" rx="40" ry="22" fill="#1e2230" stroke="#34d399" stroke-width="2"/>
  <text x="60" y="115" text-anchor="middle" fill="#34d399" font-size="12" font-weight="bold">START</text>

  <line x1="100" y1="110" x2="135" y2="110" stroke="#60a5fa" stroke-width="2" marker-end="url(#arrowCyan)"/>

  <!-- Decision: should_stop? -->
  <polygon points="185,75 235,110 185,145 135,110" fill="#1e2230" stroke="#fbbf24" stroke-width="2"/>
  <text x="185" y="107" text-anchor="middle" fill="#fbbf24" font-size="10">should</text>
  <text x="185" y="120" text-anchor="middle" fill="#fbbf24" font-size="10">stop?</text>

  <!-- Yes - exit -->
  <line x1="185" y1="145" x2="185" y2="185" stroke="#f87171" stroke-width="2" marker-end="url(#arrowRed)"/>
  <text x="195" y="168" fill="#f87171" font-size="10">yes</text>
  <ellipse cx="185" cy="207" rx="35" ry="18" fill="#1e2230" stroke="#f87171" stroke-width="2"/>
  <text x="185" y="212" text-anchor="middle" fill="#f87171" font-size="11" font-weight="bold">END</text>

  <!-- No - continue -->
  <line x1="235" y1="110" x2="275" y2="110" stroke="#60a5fa" stroke-width="2" marker-end="url(#arrowCyan)"/>
  <text x="250" y="102" fill="#34d399" font-size="10">no</text>

  <!-- Step 1: compute dt -->
  <rect x="280" y="85" width="110" height="50" rx="6" fill="#161922" stroke="#60a5fa" stroke-width="1.5" filter="url(#shadowLoop)"/>
  <text x="335" y="107" text-anchor="middle" fill="#60a5fa" font-size="11" font-weight="bold">dt = 1/tick_rate</text>
  <text x="335" y="123" text-anchor="middle" fill="#9aa0a6" font-size="9">0.01s at 100Hz</text>

  <line x1="390" y1="110" x2="415" y2="110" stroke="#60a5fa" stroke-width="2" marker-end="url(#arrowCyan)"/>

  <!-- Step 2: update behaviors -->
  <rect x="420" y="85" width="130" height="50" rx="6" fill="#161922" stroke="#34d399" stroke-width="1.5" filter="url(#shadowLoop)"/>
  <text x="485" y="105" text-anchor="middle" fill="#34d399" font-size="11" font-weight="bold">update_behaviors</text>
  <text x="485" y="123" text-anchor="middle" fill="#9aa0a6" font-size="9">Scene + EntityBhvrs</text>

  <line x1="485" y1="135" x2="485" y2="165" stroke="#60a5fa" stroke-width="2" marker-end="url(#arrowCyan)"/>

  <!-- Step 3: step physics -->
  <rect x="420" y="170" width="130" height="50" rx="6" fill="#161922" stroke="#fbbf24" stroke-width="1.5" filter="url(#shadowLoop)"/>
  <text x="485" y="190" text-anchor="middle" fill="#fbbf24" font-size="11" font-weight="bold">step_physics</text>
  <text x="485" y="208" text-anchor="middle" fill="#9aa0a6" font-size="9">Generic or Drake</text>

  <line x1="550" y1="195" x2="580" y2="195" stroke="#60a5fa" stroke-width="2" marker-end="url(#arrowCyan)"/>

  <!-- Step 4: run plugins -->
  <rect x="585" y="170" width="110" height="50" rx="6" fill="#161922" stroke="#a78bfa" stroke-width="1.5" filter="url(#shadowLoop)"/>
  <text x="640" y="190" text-anchor="middle" fill="#a78bfa" font-size="11" font-weight="bold">run_plugins</text>
  <text x="640" y="208" text-anchor="middle" fill="#9aa0a6" font-size="9">on_tick(scene)</text>

  <line x1="640" y1="220" x2="640" y2="260" stroke="#60a5fa" stroke-width="2" marker-end="url(#arrowCyan)"/>

  <!-- Step 5: REST API -->
  <rect x="575" y="265" width="130" height="45" rx="6" fill="#161922" stroke="#60a5fa" stroke-width="1.5" filter="url(#shadowLoop)"/>
  <text x="640" y="285" text-anchor="middle" fill="#60a5fa" font-size="11" font-weight="bold">process_requests</text>
  <text x="640" y="300" text-anchor="middle" fill="#9aa0a6" font-size="9">REST API</text>

  <!-- Loop back arrow -->
  <line x1="575" y1="287" x2="250" y2="287" stroke="#60a5fa" stroke-width="1.5" stroke-dasharray="6"/>
  <line x1="250" y1="287" x2="250" y2="150" stroke="#60a5fa" stroke-width="1.5" stroke-dasharray="6"/>
  <line x1="250" y1="150" x2="210" y2="130" stroke="#60a5fa" stroke-width="1.5" stroke-dasharray="6" marker-end="url(#arrowCyan)"/>
  <text x="350" y="280" text-anchor="middle" fill="#60a5fa" font-size="10">loop back</text>
</svg>