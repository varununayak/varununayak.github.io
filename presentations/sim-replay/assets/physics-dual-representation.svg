<svg xmlns="http://www.w3.org/2000/svg" width="900" height="550" viewBox="0 0 900 550" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif">
  <defs>
    <linearGradient id="headerGrad3" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#f87171"/>
    </linearGradient>
    <filter id="shadow3">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.3"/>
    </filter>
    <marker id="arrowBlue" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#60a5fa"/>
    </marker>
    <marker id="arrowOrange" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#fbbf24"/>
    </marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#34d399"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="900" height="550" fill="#0f1117" rx="12"/>

  <!-- Title -->
  <text x="450" y="35" text-anchor="middle" fill="url(#headerGrad3)" font-size="20" font-weight="bold">Physics: Generic Sim vs Drake &amp; SimState Management</text>

  <!-- Left: Generic Sim -->
  <rect x="30" y="55" width="400" height="240" rx="8" fill="#1e2230" stroke="#60a5fa" stroke-width="2" filter="url(#shadow3)"/>
  <text x="230" y="80" text-anchor="middle" fill="#60a5fa" font-size="16" font-weight="bold">Generic Sim Physics</text>

  <rect x="50" y="95" width="360" height="40" rx="5" fill="#161922" stroke="#60a5fa" stroke-width="1"/>
  <text x="230" y="120" text-anchor="middle" fill="#e8eaed" font-size="12">Kinematic motion (set poses directly)</text>

  <rect x="50" y="145" width="360" height="40" rx="5" fill="#161922" stroke="#60a5fa" stroke-width="1"/>
  <text x="230" y="170" text-anchor="middle" fill="#e8eaed" font-size="12">Basic gravity (free-fall for DYNAMIC objects)</text>

  <rect x="50" y="195" width="360" height="40" rx="5" fill="#161922" stroke="#60a5fa" stroke-width="1"/>
  <text x="230" y="220" text-anchor="middle" fill="#e8eaed" font-size="12">No contact/collision response</text>

  <rect x="50" y="250" width="360" height="30" rx="5" fill="rgba(96,165,250,0.15)" stroke="#60a5fa" stroke-width="1" stroke-dasharray="4"/>
  <text x="230" y="270" text-anchor="middle" fill="#60a5fa" font-size="11">Fast: runs in-process, no IPC overhead</text>

  <!-- Right: Drake Physics -->
  <rect x="470" y="55" width="400" height="240" rx="8" fill="#1e2230" stroke="#f87171" stroke-width="2" filter="url(#shadow3)"/>
  <text x="670" y="80" text-anchor="middle" fill="#f87171" font-size="16" font-weight="bold">Drake Physics (gRPC)</text>

  <rect x="490" y="95" width="360" height="40" rx="5" fill="#161922" stroke="#f87171" stroke-width="1"/>
  <text x="670" y="120" text-anchor="middle" fill="#e8eaed" font-size="12">MultibodyPlant rigid-body dynamics</text>

  <rect x="490" y="145" width="360" height="40" rx="5" fill="#161922" stroke="#f87171" stroke-width="1"/>
  <text x="670" y="170" text-anchor="middle" fill="#e8eaed" font-size="12">Hydroelastic contact model</text>

  <rect x="490" y="195" width="360" height="40" rx="5" fill="#161922" stroke="#f87171" stroke-width="1"/>
  <text x="670" y="220" text-anchor="middle" fill="#e8eaed" font-size="12">Full contact forces, friction, restitution</text>

  <rect x="490" y="250" width="360" height="30" rx="5" fill="rgba(248,113,113,0.15)" stroke="#f87171" stroke-width="1" stroke-dasharray="4"/>
  <text x="670" y="270" text-anchor="middle" fill="#f87171" font-size="11">Accurate: separate process via gRPC</text>

  <!-- Sync Arrows between them -->
  <line x1="430" y1="120" x2="470" y2="120" stroke="#fbbf24" stroke-width="2" marker-end="url(#arrowOrange)"/>
  <line x1="470" y1="170" x2="430" y2="170" stroke="#34d399" stroke-width="2" marker-end="url(#arrowGreen)"/>
  <text x="450" y="155" text-anchor="middle" fill="#fbbf24" font-size="9">sync</text>

  <!-- SimState Section -->
  <rect x="30" y="315" width="840" height="220" rx="8" fill="#1e2230" stroke="#fbbf24" stroke-width="2" filter="url(#shadow3)"/>
  <text x="450" y="340" text-anchor="middle" fill="#fbbf24" font-size="16" font-weight="bold">SimState Management</text>

  <!-- State boxes -->
  <rect x="60" y="360" width="200" height="80" rx="8" fill="#161922" stroke="#60a5fa" stroke-width="2"/>
  <text x="160" y="390" text-anchor="middle" fill="#60a5fa" font-size="14" font-weight="bold">STATIC</text>
  <text x="160" y="410" text-anchor="middle" fill="#9aa0a6" font-size="10">Fixed in place</text>
  <text x="160" y="428" text-anchor="middle" fill="#9aa0a6" font-size="10">e.g. table, conveyor frame</text>

  <rect x="350" y="360" width="200" height="80" rx="8" fill="#161922" stroke="#fbbf24" stroke-width="2"/>
  <text x="450" y="390" text-anchor="middle" fill="#fbbf24" font-size="14" font-weight="bold">DYNAMIC</text>
  <text x="450" y="410" text-anchor="middle" fill="#9aa0a6" font-size="10">Physics-driven motion</text>
  <text x="450" y="428" text-anchor="middle" fill="#9aa0a6" font-size="10">e.g. free-falling box</text>

  <rect x="640" y="360" width="210" height="80" rx="8" fill="#161922" stroke="#34d399" stroke-width="2"/>
  <text x="745" y="390" text-anchor="middle" fill="#34d399" font-size="14" font-weight="bold">KINEMATIC</text>
  <text x="745" y="410" text-anchor="middle" fill="#9aa0a6" font-size="10">Script-controlled motion</text>
  <text x="745" y="428" text-anchor="middle" fill="#9aa0a6" font-size="10">e.g. robot arm, gripper</text>

  <!-- Transition arrows -->
  <line x1="265" y1="395" x2="345" y2="395" stroke="#60a5fa" stroke-width="1.5" marker-end="url(#arrowBlue)"/>
  <text x="305" y="388" text-anchor="middle" fill="#60a5fa" font-size="9">release</text>

  <line x1="345" y1="410" x2="265" y2="410" stroke="#60a5fa" stroke-width="1.5" marker-end="url(#arrowBlue)"/>
  <text x="305" y="428" text-anchor="middle" fill="#60a5fa" font-size="9">settle</text>

  <line x1="555" y1="395" x2="635" y2="395" stroke="#60a5fa" stroke-width="1.5" marker-end="url(#arrowBlue)"/>
  <text x="595" y="388" text-anchor="middle" fill="#60a5fa" font-size="9">grasp</text>

  <line x1="635" y1="410" x2="555" y2="410" stroke="#60a5fa" stroke-width="1.5" marker-end="url(#arrowBlue)"/>
  <text x="595" y="428" text-anchor="middle" fill="#60a5fa" font-size="9">drop</text>

  <!-- Rules box -->
  <rect x="60" y="460" width="790" height="60" rx="6" fill="#161922" stroke="#fbbf24" stroke-width="1"/>
  <text x="450" y="480" text-anchor="middle" fill="#fbbf24" font-size="12" font-weight="bold">Box State Rules by Position</text>
  <text x="200" y="505" text-anchor="middle" fill="#9aa0a6" font-size="11">On conveyor → STATIC</text>
  <text x="450" y="505" text-anchor="middle" fill="#9aa0a6" font-size="11">In gripper → KINEMATIC</text>
  <text x="700" y="505" text-anchor="middle" fill="#9aa0a6" font-size="11">Released mid-air → DYNAMIC</text>
</svg>