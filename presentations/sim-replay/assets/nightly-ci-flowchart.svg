<svg xmlns="http://www.w3.org/2000/svg" width="900" height="400" viewBox="0 0 900 400" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif">
  <defs>
    <linearGradient id="ciGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f87171"/>
      <stop offset="100%" stop-color="#fbbf24"/>
    </linearGradient>
    <filter id="shadowCI">
      <feDropShadow dx="1" dy="1" stdDeviation="2" flood-opacity="0.3"/>
    </filter>
    <marker id="arrowCI" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#60a5fa"/>
    </marker>
    <marker id="arrowDown" markerWidth="7" markerHeight="10" refX="3.5" refY="10" orient="auto">
      <polygon points="0 0, 3.5 10, 7 0" fill="#60a5fa"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="900" height="400" fill="#0f1117" rx="10"/>

  <!-- Title -->
  <text x="450" y="30" text-anchor="middle" fill="url(#ciGrad)" font-size="18" font-weight="bold">Nightly Sim CI/CD Pipeline</text>

  <!-- Row 1: Trigger → Build → Deploy -->
  <rect x="30" y="55" width="140" height="65" rx="8" fill="#161922" stroke="#fbbf24" stroke-width="2"/>
  <text x="100" y="78" text-anchor="middle" fill="#fbbf24" font-size="12" font-weight="bold">GitLab Schedule</text>
  <text x="100" y="98" text-anchor="middle" fill="#9aa0a6" font-size="10">Nightly @ 2 AM</text>
  <text x="100" y="112" text-anchor="middle" fill="#9aa0a6" font-size="10">Triggers pipeline</text>

  <line x1="170" y1="87" x2="205" y2="87" stroke="#60a5fa" stroke-width="2" marker-end="url(#arrowCI)"/>

  <rect x="210" y="55" width="140" height="65" rx="8" fill="#161922" stroke="#60a5fa" stroke-width="2"/>
  <text x="280" y="78" text-anchor="middle" fill="#60a5fa" font-size="12" font-weight="bold">Docker Build</text>
  <text x="280" y="98" text-anchor="middle" fill="#9aa0a6" font-size="10">Pull latest sim image</text>
  <text x="280" y="112" text-anchor="middle" fill="#9aa0a6" font-size="10">with YAML configs</text>

  <line x1="350" y1="87" x2="385" y2="87" stroke="#60a5fa" stroke-width="2" marker-end="url(#arrowCI)"/>

  <rect x="390" y="55" width="160" height="65" rx="8" fill="#161922" stroke="#34d399" stroke-width="2"/>
  <text x="470" y="78" text-anchor="middle" fill="#34d399" font-size="12" font-weight="bold">deploy_queued_sim.sh</text>
  <text x="470" y="98" text-anchor="middle" fill="#9aa0a6" font-size="10">Launch sim containers</text>
  <text x="470" y="112" text-anchor="middle" fill="#9aa0a6" font-size="10">Start REST API on :8080</text>

  <line x1="550" y1="87" x2="585" y2="87" stroke="#60a5fa" stroke-width="2" marker-end="url(#arrowCI)"/>

  <rect x="590" y="55" width="140" height="65" rx="8" fill="#161922" stroke="#a78bfa" stroke-width="2"/>
  <text x="660" y="78" text-anchor="middle" fill="#a78bfa" font-size="12" font-weight="bold">Sim Running</text>
  <text x="660" y="98" text-anchor="middle" fill="#9aa0a6" font-size="10">100Hz update loop</text>
  <text x="660" y="112" text-anchor="middle" fill="#9aa0a6" font-size="10">Plugins active</text>

  <line x1="730" y1="87" x2="765" y2="87" stroke="#60a5fa" stroke-width="2" marker-end="url(#arrowCI)"/>

  <rect x="770" y="55" width="110" height="65" rx="8" fill="#161922" stroke="#60a5fa" stroke-width="2"/>
  <text x="825" y="78" text-anchor="middle" fill="#60a5fa" font-size="12" font-weight="bold">Poll /status</text>
  <text x="825" y="98" text-anchor="middle" fill="#9aa0a6" font-size="10">Every 30s</text>
  <text x="825" y="112" text-anchor="middle" fill="#9aa0a6" font-size="10">Until done</text>

  <!-- Arrow down from Poll -->
  <line x1="825" y1="120" x2="825" y2="160" stroke="#60a5fa" stroke-width="2" marker-end="url(#arrowDown)"/>

  <!-- Row 2: Results collection -->
  <rect x="30" y="165" width="850" height="10" rx="3" fill="#1e2230" stroke="#fbbf24" stroke-width="1"/>
  <text x="450" y="200" text-anchor="middle" fill="#fbbf24" font-size="14" font-weight="bold">Result Collection & Reporting</text>

  <!-- Result boxes -->
  <rect x="30" y="215" width="195" height="80" rx="8" fill="#161922" stroke="#60a5fa" stroke-width="1.5"/>
  <text x="127" y="240" text-anchor="middle" fill="#60a5fa" font-size="12" font-weight="bold">WandB Artifacts</text>
  <text x="127" y="260" text-anchor="middle" fill="#9aa0a6" font-size="10">Metrics: cycle times, PPH</text>
  <text x="127" y="278" text-anchor="middle" fill="#9aa0a6" font-size="10">Historical comparison</text>

  <rect x="245" y="215" width="195" height="80" rx="8" fill="#161922" stroke="#34d399" stroke-width="1.5"/>
  <text x="342" y="240" text-anchor="middle" fill="#34d399" font-size="12" font-weight="bold">GitLab Reports</text>
  <text x="342" y="260" text-anchor="middle" fill="#9aa0a6" font-size="10">JUnit XML for MR badges</text>
  <text x="342" y="275" text-anchor="middle" fill="#9aa0a6" font-size="10">Pass/fail per config</text>
  <text x="342" y="290" text-anchor="middle" fill="#9aa0a6" font-size="10">Block bad merges</text>

  <rect x="460" y="215" width="195" height="80" rx="8" fill="#161922" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="557" y="240" text-anchor="middle" fill="#a78bfa" font-size="12" font-weight="bold">Slack Notifications</text>
  <text x="557" y="260" text-anchor="middle" fill="#9aa0a6" font-size="10">#sim-nightly channel</text>
  <text x="557" y="275" text-anchor="middle" fill="#9aa0a6" font-size="10">Summary + WandB links</text>
  <text x="557" y="290" text-anchor="middle" fill="#9aa0a6" font-size="10">Failure triage info</text>

  <rect x="675" y="215" width="195" height="80" rx="8" fill="#161922" stroke="#f87171" stroke-width="1.5"/>
  <text x="772" y="240" text-anchor="middle" fill="#f87171" font-size="12" font-weight="bold">Data Platform</text>
  <text x="772" y="260" text-anchor="middle" fill="#9aa0a6" font-size="10">Long-term metrics storage</text>
  <text x="772" y="275" text-anchor="middle" fill="#9aa0a6" font-size="10">Trend dashboards</text>
  <text x="772" y="290" text-anchor="middle" fill="#9aa0a6" font-size="10">Regression detection</text>

  <!-- Footer -->
  <rect x="30" y="320" width="850" height="55" rx="8" fill="#1e2230" stroke="#60a5fa" stroke-width="1" stroke-dasharray="4"/>
  <text x="450" y="345" text-anchor="middle" fill="#60a5fa" font-size="13" font-weight="bold">20+ configs x 50 cycles/config = 1000+ simulated pick-place cycles per night</text>
  <text x="450" y="365" text-anchor="middle" fill="#9aa0a6" font-size="11">Results available by morning - engineers review before starting work</text>
</svg>