<svg xmlns="http://www.w3.org/2000/svg" width="850" height="400" viewBox="0 0 850 400" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif">
  <defs>
    <linearGradient id="headerGrad2" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#60a5fa"/>
    </linearGradient>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#60a5fa"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="850" height="400" fill="#0f1117" rx="12"/>

  <!-- Title -->
  <text x="425" y="35" text-anchor="middle" fill="url(#headerGrad2)" font-size="20" font-weight="bold">SimPlugin Protocol &amp; Lifecycle</text>

  <!-- Protocol Box -->
  <rect x="50" y="55" width="750" height="120" rx="8" fill="#1e2230" stroke="#a78bfa" stroke-width="2"/>
  <text x="70" y="80" fill="#a78bfa" font-size="14" font-weight="bold">SimPlugin Protocol (ABC)</text>

  <!-- Lifecycle steps -->
  <rect x="70" y="90" width="120" height="55" rx="6" fill="#161922" stroke="#34d399" stroke-width="2"/>
  <text x="130" y="112" text-anchor="middle" fill="#34d399" font-size="13" font-weight="bold">setup()</text>
  <text x="130" y="132" text-anchor="middle" fill="#9aa0a6" font-size="10">Initialize state</text>

  <line x1="195" y1="117" x2="240" y2="117" stroke="#60a5fa" stroke-width="2" marker-end="url(#arrowhead)"/>

  <rect x="245" y="90" width="150" height="55" rx="6" fill="#161922" stroke="#fbbf24" stroke-width="2"/>
  <text x="320" y="112" text-anchor="middle" fill="#fbbf24" font-size="13" font-weight="bold">on_tick(scene)</text>
  <text x="320" y="132" text-anchor="middle" fill="#9aa0a6" font-size="10">Called every tick</text>

  <!-- Loop arrow -->
  <path d="M 395 100 Q 420 80 395 95" fill="none" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="415" y="95" fill="#fbbf24" font-size="10">loop</text>

  <line x1="400" y1="117" x2="450" y2="117" stroke="#60a5fa" stroke-width="2" marker-end="url(#arrowhead)"/>

  <rect x="455" y="90" width="140" height="55" rx="6" fill="#161922" stroke="#f87171" stroke-width="2"/>
  <text x="525" y="112" text-anchor="middle" fill="#f87171" font-size="13" font-weight="bold">teardown()</text>
  <text x="525" y="132" text-anchor="middle" fill="#9aa0a6" font-size="10">Cleanup &amp; report</text>

  <line x1="600" y1="117" x2="645" y2="117" stroke="#60a5fa" stroke-width="2" marker-end="url(#arrowhead)"/>

  <rect x="650" y="90" width="130" height="55" rx="6" fill="#161922" stroke="#60a5fa" stroke-width="2"/>
  <text x="715" y="112" text-anchor="middle" fill="#60a5fa" font-size="13" font-weight="bold">result()</text>
  <text x="715" y="132" text-anchor="middle" fill="#9aa0a6" font-size="10">Return outcome</text>

  <!-- Plugin Types Grid -->
  <text x="425" y="205" text-anchor="middle" fill="#60a5fa" font-size="16" font-weight="bold">Plugin Types</text>

  <!-- Row 1: 4 plugins evenly spaced -->
  <rect x="30" y="220" width="185" height="120" rx="8" fill="#1e2230" stroke="#f87171" stroke-width="1.5"/>
  <text x="122" y="245" text-anchor="middle" fill="#f87171" font-size="13" font-weight="bold">EndConditionPlugin</text>
  <text x="122" y="268" text-anchor="middle" fill="#9aa0a6" font-size="11">Monitors completion criteria</text>
  <text x="122" y="288" text-anchor="middle" fill="#9aa0a6" font-size="11">e.g. &quot;all boxes placed&quot;</text>
  <text x="122" y="325" text-anchor="middle" fill="#34d399" font-size="10">Returns: PASS / FAIL / TIMEOUT</text>

  <rect x="230" y="220" width="185" height="120" rx="8" fill="#1e2230" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="322" y="245" text-anchor="middle" fill="#fbbf24" font-size="13" font-weight="bold">WatchdogPlugin</text>
  <text x="322" y="268" text-anchor="middle" fill="#9aa0a6" font-size="11">Safety monitoring</text>
  <text x="322" y="288" text-anchor="middle" fill="#9aa0a6" font-size="11">Timeout, stuck detection</text>
  <text x="322" y="325" text-anchor="middle" fill="#34d399" font-size="10">Action: Force-stop sim</text>

  <rect x="430" y="220" width="185" height="120" rx="8" fill="#1e2230" stroke="#60a5fa" stroke-width="1.5"/>
  <text x="522" y="245" text-anchor="middle" fill="#60a5fa" font-size="13" font-weight="bold">WandBPlugin</text>
  <text x="522" y="268" text-anchor="middle" fill="#9aa0a6" font-size="11">Logs metrics to W&amp;B</text>
  <text x="522" y="288" text-anchor="middle" fill="#9aa0a6" font-size="11">Cycle times, throughput</text>
  <text x="522" y="325" text-anchor="middle" fill="#34d399" font-size="10">Artifacts: Metrics, plots</text>

  <rect x="630" y="220" width="185" height="120" rx="8" fill="#1e2230" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="722" y="245" text-anchor="middle" fill="#a78bfa" font-size="13" font-weight="bold">SlackPlugin</text>
  <text x="722" y="268" text-anchor="middle" fill="#9aa0a6" font-size="11">Posts results to Slack</text>
  <text x="722" y="288" text-anchor="middle" fill="#9aa0a6" font-size="11">Pass/fail + summary</text>
  <text x="722" y="325" text-anchor="middle" fill="#34d399" font-size="10">Channel: #sim-results</text>

  <!-- Row 2: StatusPlugin centered -->
  <rect x="330" y="355" width="185" height="35" rx="8" fill="#1e2230" stroke="#60a5fa" stroke-width="1.5"/>
  <text x="422" y="377" text-anchor="middle" fill="#60a5fa" font-size="13" font-weight="bold">StatusPlugin</text>
</svg>
